<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>myAI — Icon-Sets (alle Umgebungen)</title>
  <link rel="icon" href="./prod/favicon.ico" sizes="48x48">
  <style>
    :root { --bg:#f4f5f7; --fg:#11131a; --muted:#5b6170; --card:#fff; --line:#e3e6ec; }
    @media (prefers-color-scheme: dark){ :root{ --bg:#0d0f14; --fg:#eef0f5; --muted:#9aa1b1; --card:#161922; --line:#272c38; } }
    body{ margin:0; background:var(--bg); color:var(--fg); font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:32px 18px; }
    .wrap{ max-width:560px; margin:0 auto; } h1{ font-size:22px; margin:0 0 16px; }
    .card{ display:flex; gap:16px; align-items:center; text-decoration:none; color:inherit; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-top:12px; }
    .card img{ width:56px; height:56px; border-radius:13px; }
    .card h2{ font-size:16px; margin:0 0 2px; } .card p{ color:var(--muted); margin:0; font-size:13px; }
    .tag{ display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; color:#fff; margin-left:6px; vertical-align:middle; background:#0a2a6b; }
  </style>
</head>
<body><div class="wrap"><h1>myAI — Icon-Sets pro Umgebung</h1>
    <a class="card" href="./prod/">
      <img src="./prod/icons/apple-touch-icon.png" alt="">
      <div><h2>myAI <span class="tag">PROD</span></h2><p>Favicon · Touchicon · Maskable + Test-Seite</p></div>
    </a>
    <a class="card" href="./dev/">
      <img src="./dev/icons/apple-touch-icon.png" alt="">
      <div><h2>myAI DEV <span class="tag">DEV</span></h2><p>Favicon · Touchicon · Maskable + Test-Seite</p></div>
    </a>
    <a class="card" href="./tst/">
      <img src="./tst/icons/apple-touch-icon.png" alt="">
      <div><h2>myAI TST <span class="tag">TST</span></h2><p>Favicon · Touchicon · Maskable + Test-Seite</p></div>
    </a>
    <a class="card" href="./stg/">
      <img src="./stg/icons/apple-touch-icon.png" alt="">
      <div><h2>myAI STG <span class="tag">STG</span></h2><p>Favicon · Touchicon · Maskable + Test-Seite</p></div>
    </a>
</div></body>
</html>
